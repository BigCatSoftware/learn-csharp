<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 240" fill="none">
  <style>
    text { font-family: 'JetBrains Mono', 'Fira Code', monospace; }
    .node { stroke: #6c63ff; stroke-width: 2; fill: #16162a; }
    .val { font-size: 14px; fill: #e8e6f0; font-weight: 600; }
    .edge { stroke: #8b89a0; stroke-width: 1.5; }
    .label { font-size: 11px; fill: #8b89a0; }
    .list-bg { fill: #10101e; rx: 4; }
    .list-item { font-size: 11px; fill: #4ecdc4; }
    .list-label { font-size: 11px; fill: #6c63ff; font-weight: 600; }
  </style>
  <!-- Graph visualization -->
  <text x="90" y="15" class="label" text-anchor="middle">Graph</text>
  <!-- Nodes -->
  <circle cx="90" cy="50" r="18" class="node"/><text x="90" y="56" class="val" text-anchor="middle">0</text>
  <circle cx="30" cy="120" r="18" class="node"/><text x="30" y="126" class="val" text-anchor="middle">1</text>
  <circle cx="150" cy="120" r="18" class="node"/><text x="150" y="126" class="val" text-anchor="middle">2</text>
  <circle cx="90" cy="190" r="18" class="node"/><text x="90" y="196" class="val" text-anchor="middle">3</text>
  <!-- Edges -->
  <line x1="78" y1="64" x2="42" y2="106" class="edge"/>
  <line x1="102" y1="64" x2="138" y2="106" class="edge"/>
  <line x1="30" y1="138" x2="78" y2="176" class="edge"/>
  <line x1="150" y1="138" x2="102" y2="176" class="edge"/>
  <!-- Adjacency list -->
  <text x="340" y="15" class="label" text-anchor="middle">Adjacency List</text>
  <rect x="240" y="30" width="200" height="30" class="list-bg" stroke="#1e1e36" stroke-width="1"/>
  <text x="260" y="50" class="list-label">0:</text><text x="290" y="50" class="list-item">[1, 2]</text>
  <rect x="240" y="65" width="200" height="30" class="list-bg" stroke="#1e1e36" stroke-width="1"/>
  <text x="260" y="85" class="list-label">1:</text><text x="290" y="85" class="list-item">[0, 3]</text>
  <rect x="240" y="100" width="200" height="30" class="list-bg" stroke="#1e1e36" stroke-width="1"/>
  <text x="260" y="120" class="list-label">2:</text><text x="290" y="120" class="list-item">[0, 3]</text>
  <rect x="240" y="135" width="200" height="30" class="list-bg" stroke="#1e1e36" stroke-width="1"/>
  <text x="260" y="155" class="list-label">3:</text><text x="290" y="155" class="list-item">[1, 2]</text>
</svg>
