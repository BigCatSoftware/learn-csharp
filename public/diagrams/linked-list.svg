<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 100" fill="none">
  <style>
    text { font-family: 'JetBrains Mono', 'Fira Code', monospace; }
    .node { stroke: #6c63ff; stroke-width: 1.5; fill: #16162a; rx: 6; }
    .val { font-size: 14px; fill: #e8e6f0; font-weight: 600; }
    .ptr { font-size: 10px; fill: #8b89a0; }
    .arrow { stroke: #6c63ff; stroke-width: 1.5; fill: none; marker-end: url(#la); }
    .label { font-size: 11px; fill: #4ecdc4; font-weight: 600; }
    .null-label { font-size: 11px; fill: #5c5a70; font-style: italic; }
  </style>
  <defs>
    <marker id="la" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#6c63ff"/>
    </marker>
  </defs>
  <!-- Head label -->
  <text x="50" y="20" class="label" text-anchor="middle">head</text>
  <line x1="50" y1="24" x2="50" y2="34" stroke="#4ecdc4" stroke-width="1" marker-end="url(#la)"/>
  <!-- Node 1 -->
  <rect x="10" y="38" width="80" height="44" class="node"/>
  <text x="36" y="56" class="val" text-anchor="middle">10</text>
  <text x="36" y="74" class="ptr" text-anchor="middle">next</text>
  <line x1="90" y1="60" x2="130" y2="60" class="arrow"/>
  <!-- Node 2 -->
  <rect x="135" y="38" width="80" height="44" class="node"/>
  <text x="161" y="56" class="val" text-anchor="middle">20</text>
  <text x="161" y="74" class="ptr" text-anchor="middle">next</text>
  <line x1="215" y1="60" x2="255" y2="60" class="arrow"/>
  <!-- Node 3 -->
  <rect x="260" y="38" width="80" height="44" class="node"/>
  <text x="286" y="56" class="val" text-anchor="middle">30</text>
  <text x="286" y="74" class="ptr" text-anchor="middle">next</text>
  <line x1="340" y1="60" x2="380" y2="60" class="arrow"/>
  <!-- Node 4 -->
  <rect x="385" y="38" width="80" height="44" class="node"/>
  <text x="411" y="56" class="val" text-anchor="middle">40</text>
  <text x="411" y="74" class="ptr" text-anchor="middle">next</text>
  <line x1="465" y1="60" x2="505" y2="60" class="arrow"/>
  <!-- Null -->
  <text x="525" y="64" class="null-label">null</text>
</svg>
