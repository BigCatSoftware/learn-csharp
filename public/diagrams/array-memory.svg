<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 140" fill="none">
  <style>
    text { font-family: 'JetBrains Mono', 'Fira Code', monospace; fill: #e8e6f0; }
    .label { font-size: 12px; fill: #8b89a0; }
    .value { font-size: 14px; font-weight: 600; fill: #e8e6f0; }
    .addr { font-size: 10px; fill: #5c5a70; }
    .box { stroke: #6c63ff; stroke-width: 1.5; fill: #16162a; rx: 4; }
    .stack-box { stroke: #4ecdc4; stroke-width: 1.5; fill: #16162a; rx: 4; }
    .arrow { stroke: #6c63ff; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6c63ff"/>
    </marker>
  </defs>
  <!-- Stack -->
  <text x="60" y="20" class="label" text-anchor="middle">Stack</text>
  <rect x="10" y="30" width="100" height="36" class="stack-box"/>
  <text x="60" y="53" class="value" text-anchor="middle">arr →</text>
  <!-- Arrow -->
  <line x1="110" y1="48" x2="175" y2="48" class="arrow"/>
  <!-- Heap label -->
  <text x="400" y="20" class="label" text-anchor="middle">Managed Heap (contiguous)</text>
  <!-- Array cells -->
  <rect x="180" y="30" width="80" height="36" class="box"/>
  <text x="220" y="53" class="value" text-anchor="middle">10</text>
  <rect x="260" y="30" width="80" height="36" class="box"/>
  <text x="300" y="53" class="value" text-anchor="middle">20</text>
  <rect x="340" y="30" width="80" height="36" class="box"/>
  <text x="380" y="53" class="value" text-anchor="middle">30</text>
  <rect x="420" y="30" width="80" height="36" class="box"/>
  <text x="460" y="53" class="value" text-anchor="middle">40</text>
  <rect x="500" y="30" width="80" height="36" class="box"/>
  <text x="540" y="53" class="value" text-anchor="middle">50</text>
  <!-- Index labels -->
  <text x="220" y="85" class="addr" text-anchor="middle">[0]</text>
  <text x="300" y="85" class="addr" text-anchor="middle">[1]</text>
  <text x="380" y="85" class="addr" text-anchor="middle">[2]</text>
  <text x="460" y="85" class="addr" text-anchor="middle">[3]</text>
  <text x="540" y="85" class="addr" text-anchor="middle">[4]</text>
  <!-- Address labels -->
  <text x="220" y="100" class="addr" text-anchor="middle">0x100</text>
  <text x="300" y="100" class="addr" text-anchor="middle">0x104</text>
  <text x="380" y="100" class="addr" text-anchor="middle">0x108</text>
  <text x="460" y="100" class="addr" text-anchor="middle">0x10C</text>
  <text x="540" y="100" class="addr" text-anchor="middle">0x110</text>
  <!-- 4 bytes note -->
  <text x="380" y="125" class="addr" text-anchor="middle">← each int = 4 bytes →</text>
</svg>
